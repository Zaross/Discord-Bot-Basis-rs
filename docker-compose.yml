version: "3.9"

services:
  bot:
    build: .
    # Or use a pre-built image:
    # image: ghcr.io/zaross/discord-bot-basis-rs:latest
    restart: unless-stopped
    environment:
      - BOT_NAME=${BOT_NAME:-MyBot}
      - TOKEN=${TOKEN}
      - OWNER_ID=${OWNER_ID}
      - SUPPORT_SERVER=${SUPPORT_SERVER}
      - DATABASE_URL=${DATABASE_URL:-sqlite}
      - RUST_LOG=info,serenity=warn,sqlx=warn
      - SHARD_COUNT=${SHARD_COUNT:-auto}
    ports:
      - "5000:5000"
    volumes:
      - bot_data:/app/${BOT_NAME:-MyBot}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional Postgres service
  # Set DATABASE_URL=postgres://bot:secret@db:5432/botdb in your .env
  # db:
  #   image: postgres:16-alpine
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_USER: bot
  #     POSTGRES_PASSWORD: secret
  #     POSTGRES_DB: botdb
  #   volumes:
  #     - pg_data:/var/lib/postgresql/data

volumes:
  bot_data:
